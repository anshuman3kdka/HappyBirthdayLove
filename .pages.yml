media:
  - name: images
    label: Images
    input: public/assets/image
    output: /assets/image
    categories: [image]
    extensions: [jpg, jpeg, png, webp, gif, avif]
    rename: safe
  - name: videos
    label: Videos
    input: public/assets/video
    output: /assets/video
    categories: [video]
    extensions: [mp4, webm, mov, m4v, ogg]
    rename: safe
  - name: audio
    label: Audio
    input: public/assets/audio
    output: /assets/audio
    categories: [audio]
    extensions: [mp3, wav, ogg, m4a, webm]
    rename: safe
content:
  - name: core_text
    label: Core Text & Navigation
    type: group
    items:
      - name: global_interface
        label: Global Interface Text
        type: file
        path: src/content/site.json
        format: json
        fields:
          - name: wishOverlay
            label: Wish Overlay
            type: object
            fields:
              - name: message
                label: Wish Message
                type: string
          - name: preloader
            label: Preloader
            type: object
            fields:
              - name: label
                label: Loading Label
                type: string
          - name: accessibility
            label: Accessibility Labels
            type: object
            fields:
              - name: polaroidAlt
                label: Polaroid Image Alt Text
                type: string
              - name: constellationPhotoAlt
                label: Constellation Photo Alt Text
                type: string
              - name: lightboxPhotoAlt
                label: Lightbox Photo Alt Text
                type: string
              - name: scrollUpLabel
                label: Scroll Up Button Label
                type: string
              - name: scrollDownLabel
                label: Scroll Down Button Label
                type: string
              - name: previousFilmLabel
                label: Previous Film Button Label
                type: string
              - name: nextFilmLabel
                label: Next Film Button Label
                type: string
              - name: closeLightboxLabel
                label: Close Lightbox Button Label
                type: string
              - name: voiceNotePlayPauseLabel
                label: Voice Note Button Label
                type: string
              - name: projectionPlayPauseLabel
                label: Projection Video Button Label
                type: string
          - name: journalActions
            label: Journal Action Buttons
            type: object
            fields:
              - name: revealButton
                label: Reveal Button Text
                type: string
              - name: archiveButton
                label: Archive Button Text
                type: string
          - name: archiveLabels
            label: Archive Interface Labels
            type: object
            fields:
              - name: lightboxCaption
                label: Photo Lightbox Caption
                type: string
              - name: filmStockLabel
                label: Film Stock Label
                type: string
              - name: filmFramePrefix
                label: Film Frame Prefix
                type: string
              - name: voiceNoteTimestamp
                label: Voice Note Timestamp
                type: string
          - name: secretOverlays
            label: Hidden Star Messages
            type: object
            fields:
              - name: heartTitle
                label: Heart Secret Title
                type: string
              - name: heartMessage
                label: Heart Secret Message
                type: text
              - name: heartButton
                label: Heart Secret Button
                type: string
              - name: catTitle
                label: Cat Secret Title
                type: string
              - name: catMessage
                label: Cat Secret Message
                type: text
              - name: catPostscript
                label: Cat Secret Postscript
                type: string
              - name: catButton
                label: Cat Secret Button
                type: string
      - name: navigation
        label: Global Navigation
        type: file
        path: src/content/navigation.json
        format: json
        fields:
          - name: title
            label: Navigation Title
            type: string
          - name: coord1
            label: Coordinate Line 1
            type: string
          - name: coord2
            label: Coordinate Line 2
            type: string
          - name: links
            label: Navigation Links
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{label} → {to}"
            fields:
              - name: to
                label: Route Path
                type: string
              - name: label
                label: Link Label
                type: string
      - name: envelope
        label: Envelope Entry Screen
        type: file
        path: src/content/envelope.json
        format: json
        fields:
          - name: sealInitial
            label: Wax Seal Initial
            type: string
          - name: message
            label: Letter Message
            type: string
  - name: page_text
    label: Page Text & Memories
    type: group
    items:
      - name: home
        label: Home Page
        type: file
        path: src/content/home.json
        format: json
        fields:
          - name: title
            label: Hero Title
            type: string
          - name: subtitle_1
            label: First Subtitle
            type: text
          - name: subtitle_2
            label: Second Subtitle
            type: text
          - name: bottom_date
            label: Bottom Date / Timestamp
            type: string
          - name: polaroids
            label: Polaroids
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{caption}"
            fields:
              - name: image
                label: Image
                type: image
                options:
                  media: images
              - name: caption
                label: Caption
                type: string
              - name: rotation
                label: Rotation Angle
                type: number
      - name: journal
        label: Journal Page
        type: file
        path: src/content/journal.json
        format: json
        fields:
          - name: title
            label: Journal Heading
            type: string
          - name: subtitle
            label: Journal Subtitle
            type: text
          - name: entries
            label: Journal Entries
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{date} · {coord}"
            fields:
              - name: coord
                label: Coordinates
                type: string
              - name: date
                label: Date / Timestamp
                type: string
              - name: text
                label: Entry Text
                type: text
              - name: image
                label: Background Image
                type: image
                options:
                  media: images
          - name: finalMessage
            label: Final Message
            type: object
            fields:
              - name: text1
                label: First Final Line
                type: text
              - name: text2
                label: Second Final Line
                type: string
      - name: archive
        label: Archive Page
        type: file
        path: src/content/archive.json
        format: json
        fields:
          - name: constellationPhotos
            label: Constellation Photos
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{caption}"
            fields:
              - name: image
                label: Image
                type: image
                options:
                  media: images
              - name: caption
                label: Lightbox Caption
                type: string
              - name: x
                label: X Position (%)
                type: number
              - name: y
                label: Y Position (%)
                type: number
          - name: filmstripPhotos
            label: Film Strip Photos
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{frameCode} · {frameLabel}"
            fields:
              - name: image
                label: Image
                type: image
                options:
                  media: images
              - name: frameCode
                label: Corner Frame Code
                type: string
              - name: frameLabel
                label: Bottom Frame Label
                type: string
          - name: videoMoment
            label: Video Moment
            type: object
            fields:
              - name: video
                label: Video
                type: file
                options:
                  media: videos
                  categories: [video]
              - name: caption
                label: Caption
                type: text
          - name: littleThings
            label: Little Things
            type: object
            fields:
              - name: audioVoiceNote
                label: Voice Note Audio
                type: file
                options:
                  media: audio
                  categories: [audio]
              - name: voiceNoteLabel
                label: Voice Note Caption
                type: string
              - name: ticketSeat
                label: Ticket Seat / Timestamp
                type: string
              - name: ticketTitle
                label: Ticket Title / Caption
                type: string
      - name: projection
        label: Projection Page
        type: file
        path: src/content/projection.json
        format: json
        fields:
          - name: video
            label: Projection Video
            type: file
            options:
              media: videos
              categories: [video]
          - name: caption
            label: Projection Caption
            type: text
